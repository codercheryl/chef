  <article class="voting-card">
    <header class="card-header">

        <span class="percentage" id="percentage-text">99%</span>
      </div>

      <div class="progress-track">

      </div>

      <div class="progress-stats">
        <span><span id="current-votes">5648</span> votes</span>
        <span><span id="required-votes">5688</span> votes needed</span>
      </div>

      <div class="timer-banner">
        <span class="icon">🕒</span>
        <p>
          Time remaining: <strong id="countdown-timer">--h --m --s</strong>
        </p>
      </div>
    </section>
